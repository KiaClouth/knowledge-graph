# kg.kiaclouth.com —— Graphiti MCP server 反向代理 + Bearer 鉴权
#
# 放到服务器: /etc/nginx/sites-available/kg.kiaclouth.com
# 启用:       ln -s ../sites-available/kg.kiaclouth.com /etc/nginx/sites-enabled/
# 证书:       先 certbot 签(见 deploy/DEPLOY.md 步骤),再 nginx -t && systemctl reload nginx
#
# 风格照抄 test.kiaclouth.com:certbot 管 TLS + 流式(streamable HTTP)必须关
# buffering、给足超时。区别是加了一层 Bearer token 鉴权 —— 公式 MCP server 无内建
# 认证,这里是唯一入口的门卫。
#
# ★ 把下面的 <PUT-YOUR-TOKEN-HERE> 换成 deploy/.env 里的 KG_BEARER_TOKEN(openssl
#   rand -hex 32 生成的值)。客户端 MCP 配置需带 Authorization: Bearer <同一 token>。

server {
    listen 443 ssl http2;
    server_name kg.kiaclouth.com;

    ssl_certificate     /etc/letsencrypt/live/kg.kiaclouth.com/fullchain.pem;      # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/kg.kiaclouth.com/privkey.pem;        # managed by Certbot

    ssl_session_cache shared:SSL:1m;
    ssl_session_timeout 5m;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Bearer 鉴权:未带正确 token 的请求一律 401,连不到后端 ──
    # 精确匹配 "Bearer <token>"。改 token 时同时改这里和客户端与 deploy/.env。
    set $kg_authorized 0;
    if ($http_authorization = "Bearer <PUT-YOUR-TOKEN-HERE>") {
        set $kg_authorized 1;
    }

    # /health 允许匿名(方便探活),其余全部要鉴权。
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }

    # ── 治本:从根上消除 /mcp 的 307 去尾斜杠重定向 ──
    # starlette 对无尾斜杠的 /mcp 会 307 → /mcp/,而后端不知自己在 TLS 后,
    # Location 用 http:// → 客户端跟随时协议降级 → 跨源丢 Authorization → 401。
    # 这里精确匹配无尾斜杠的 /mcp,直接把上游 /mcp/ 的响应透传回去,后端不再对
    # 客户端发 307,因此不产生任何跨协议 Location。(下方 location / 的
    # proxy_redirect 仍留作其它路径的兜底。)客户端 MCP 配置连 https://<host>/mcp。
    location = /mcp {
        if ($kg_authorized = 0) {
            return 401;
        }

        proxy_pass http://127.0.0.1:8000/mcp/;

        proxy_http_version 1.1;
        proxy_buffering off;         # 流式必须关
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location / {
        if ($kg_authorized = 0) {
            return 401;
        }

        proxy_pass http://127.0.0.1:8000/;

        # ★ 后端(uvicorn)对 /mcp/ 会 307 去尾斜杠重定向,且 Location 用 http://
        # (它不知自己在 https 后)。客户端跟随时协议降级 → 跨源 → 丢弃 Authorization
        # 头 → 401。这里把后端返回的 http Location 改写回 https,避免降级丢头。
        # (最佳实践仍是客户端直接连 /mcp 无尾斜杠,从根上不触发重定向。)
        proxy_redirect http://$host/ https://$host/;
        proxy_redirect http://127.0.0.1:8000/ https://$host/;

        proxy_http_version 1.1;      # 对上游用 1.1
        proxy_buffering off;         # 流式(SSE/streamable HTTP)必须关,否则响应被缓冲
        proxy_cache off;
        proxy_read_timeout 600s;     # 长连接 hold 时间
        proxy_send_timeout 600s;

        # MCP streamable HTTP 依赖这些头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";   # 保持上游长连接
    }
}

# HTTP → HTTPS 跳转(certbot 通常会自动加,这里显式写好)
server {
    listen 80;
    server_name kg.kiaclouth.com;
    return 301 https://$server_name$request_uri;
}
